<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Face Liveness Check — UniOs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, system-ui, sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; }
    #root { height: 100vh; }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 16px; }
    .loading .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 12px; padding: 24px; text-align: center; }
    .error button { background: #3b82f6; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; }
    [data-amplify-liveness-detector] { height: 100vh !important; }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading">
      <div class="spinner"></div>
      <p>Initializing liveness check...</p>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "aws-amplify": "https://esm.sh/aws-amplify@6.15.0",
      "aws-amplify/auth": "https://esm.sh/aws-amplify@6.15.0/auth",
      "@aws-amplify/ui-react": "https://esm.sh/@aws-amplify/ui-react@6.10.2",
      "@aws-amplify/ui-react-liveness": "https://esm.sh/@aws-amplify/ui-react-liveness@3.6.4?external=react,react-dom,aws-amplify,@aws-amplify/ui-react"
    }
  }
  </script>

  <script type="module">
    import React from 'react';
    import { createRoot } from 'react-dom/client';
    import { Amplify } from 'aws-amplify';
    import { FaceLivenessDetector } from '@aws-amplify/ui-react-liveness';
    import { ThemeProvider, Loader } from '@aws-amplify/ui-react';

    // Parse params from URL
    const params = new URLSearchParams(window.location.search);
    const SUPABASE_URL = params.get('supabase_url') || '';
    const SUPABASE_KEY = params.get('supabase_key') || '';
    const USER_ID = params.get('user_id') || '';
    const REGION = params.get('region') || 'ap-south-1';
    const TOKEN = params.get('token') || '';

    // Configure Amplify with Cognito Identity Pool for unauthenticated liveness access
    const IDENTITY_POOL_ID = params.get('identity_pool_id') || 'ap-south-1:518a81c9-8722-431a-9d1b-2e988ab4f0b5';
    Amplify.configure({
      Auth: {
        Cognito: {
          identityPoolId: IDENTITY_POOL_ID,
          allowGuestAccess: true,
        }
      }
    });

    // Post result back to React Native WebView
    function postResult(data) {
      if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(JSON.stringify(data));
      }
    }

    function App() {
      const [sessionId, setSessionId] = React.useState(null);
      const [loading, setLoading] = React.useState(true);
      const [error, setError] = React.useState(null);

      const createSession = async () => {
        setLoading(true);
        setError(null);
        try {
          const res = await fetch(`${SUPABASE_URL}/functions/v1/face-liveness-session`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${TOKEN || SUPABASE_KEY}`,
            },
            body: JSON.stringify({ action: 'create' }),
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          setSessionId(data.session_id);
          setLoading(false);
        } catch (e) {
          setError(e.message);
          setLoading(false);
        }
      };

      React.useEffect(() => { createSession(); }, []);

      const handleComplete = async () => {
        try {
          const res = await fetch(`${SUPABASE_URL}/functions/v1/face-liveness-session`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${TOKEN || SUPABASE_KEY}`,
            },
            body: JSON.stringify({ action: 'get_results', session_id: sessionId }),
          });
          const data = await res.json();
          postResult({ type: 'liveness_result', ...data });
        } catch (e) {
          postResult({ type: 'liveness_error', error: e.message });
        }
      };

      const handleError = (err) => {
        console.error('Liveness error:', err);
        postResult({ type: 'liveness_error', error: err?.message || 'Liveness check failed' });
        // Auto-retry with new session
        createSession();
      };

      const handleCancel = () => {
        postResult({ type: 'liveness_cancel' });
      };

      if (loading) {
        return React.createElement('div', { className: 'loading' },
          React.createElement('div', { className: 'spinner' }),
          React.createElement('p', null, 'Preparing liveness check...')
        );
      }

      if (error) {
        return React.createElement('div', { className: 'error' },
          React.createElement('p', null, `Error: ${error}`),
          React.createElement('button', { onClick: createSession }, 'Retry')
        );
      }

      return React.createElement(ThemeProvider, { colorMode: 'dark' },
        React.createElement(FaceLivenessDetector, {
          sessionId: sessionId,
          region: REGION,
          onAnalysisComplete: handleComplete,
          onError: handleError,
          onUserCancel: handleCancel,
          disableStartScreen: true,
        })
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
